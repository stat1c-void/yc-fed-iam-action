# This workflow will lint the entire codebase using a hybrid approach:
# - yarn-based linting for JS, Markdown, EditorConfig (via yarn run lint)
# - dedicated GitHub Actions for third-party tools (yamllint, checkov, gitleaks, etc.)
#
# This replaces super-linter for better performance and maintainability.
name: Lint Codebase

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  yarn-lint:
    name: Yarn-based Linters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Run Yarn Lint
        run: yarn run lint

  third-party-lint:
    name: Third-party Linters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check workflow files (actionlint)
        # yamllint disable rule:line-length
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
        # yamllint enable rule:line-length
        shell: bash

      - name: yamllint
        run: |
          pip install yamllint
          yamllint .

      - name: Validate GitHub Actions security (zizmor)
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          advanced-security: false
          annotations: true

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Infrastructure as Code security (checkov)
        uses: bridgecrewio/checkov-action@4b38516b47b2df46475d84383f9aa2c8ef912aae # v12.3087.0
        with:
          directory: .
          skip_path: dist,coverage,node_modules
