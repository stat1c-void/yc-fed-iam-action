# This workflow will lint the entire codebase using a hybrid approach:
# - yarn-based linting for JS, Markdown, EditorConfig (via yarn run lint)
# - dedicated GitHub Actions for third-party tools (yamllint, checkov, gitleaks, etc.)
#
# This replaces super-linter for better performance and maintainability.
name: Lint Codebase

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  yarn-lint:
    name: Yarn-based Linters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Run Yarn Lint
        run: yarn run lint

  third-party-lint:
    name: Third-party Linters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check workflow files
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
        shell: bash

      - name: Validate GitHub Actions security (zizmor)
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          advanced-security: false
          annotations: true

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Infrastructure as Code security (checkov)
        uses: bridgecrewio/checkov-action@99022a173575a81ccfcab2d354584832a0b1cc06 # v12.3000.0
        with:
          directory: .
          framework: github_actions,yaml
          skip_path: dist/ coverage/ node_modules/

      - name: YAML lint
        uses: ibiqlik/action-yamllint@ae1abb2821b567e96742aa776f7b62c9b6a26bc8 # v3
        with:
          file_or_dir: .
          config_file: .yaml-lint.yml
          exclude: ^(dist|coverage|node_modules)/
